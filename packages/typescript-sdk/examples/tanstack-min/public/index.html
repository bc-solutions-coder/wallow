<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wallow BFF · tanstack-min</title>
  </head>
  <body>
    <main>
      <h1>Wallow BFF example</h1>

      <!--
        DOM contract driven by the .NET E2E test (BffFlowTests).
        Selectors follow the {page}-{element} kebab-case convention.
        The GREEN client (src/app.ts) populates these from getUser()/the /api call.
      -->
      <p>
        Status: <span data-testid="bff-user-status">anonymous</span>
      </p>
      <p>
        Signed in as: <span data-testid="bff-user-email"></span>
      </p>

      <button type="button" data-testid="bff-login">Sign in</button>
      <button type="button" data-testid="bff-logout">Sign out</button>
      <button type="button" data-testid="bff-call-api">Call API</button>

      <pre data-testid="bff-api-result"></pre>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
