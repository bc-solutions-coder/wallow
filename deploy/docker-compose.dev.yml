# docker-compose.dev.yml
# Development environment overrides

services:
  app:
    ports:
      - "8081:8080"
    environment:
      Smtp__Host: mailpit
      Smtp__Port: "1025"

  postgres:
    ports:
      - "5433:5432"

  # ============================================
  # EMAIL TESTING
  # ============================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-mailpit
    ports:
      - "18025:8025"
    networks:
      - wallow
    restart: unless-stopped
