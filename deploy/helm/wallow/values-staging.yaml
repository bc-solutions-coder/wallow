# Wallow Helm Chart - Staging Environment Values

replicaCount: 2

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: staging.wallow.example.com
  tls:
    enabled: true
    secretName: wallow-staging-tls

resources:
  requests:
    memory: 256Mi
    cpu: 500m
  limits:
    memory: 512Mi
    cpu: 1000m

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

config:
  ASPNETCORE_ENVIRONMENT: Staging

# Subcharts disabled — staging uses external managed services
postgresql:
  enabled: false

valkey:
  enabled: false
