# Wallow Helm Chart - EU West Region Overrides
# Usage: helm install wallow ./wallow -f values.yaml -f values-eu-west.yaml

replicaCount: 3

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: eu-west.wallow.example.com
  tls:
    enabled: true
    secretName: wallow-eu-west-tls

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75

config:
  ASPNETCORE_ENVIRONMENT: Production
  WALLOW_REGION: eu-west
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability:4317"

secrets:
  ConnectionStrings__DefaultConnection: ""  # Set via --set or external secret
  ConnectionStrings__Redis: ""
  AWS__S3__BucketName: "wallow-assets-eu-west"
  AWS__S3__Region: "eu-west-1"
