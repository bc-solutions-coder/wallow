# Wallow Helm Chart - Development Environment Values
# Usage: helm install wallow ./wallow -f wallow/values-dev.yaml

replicaCount: 1

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

resources:
  requests:
    memory: 128Mi
    cpu: 250m
  limits:
    memory: 256Mi
    cpu: 500m

config:
  ASPNETCORE_ENVIRONMENT: Development

secrets:
  ConnectionStrings__DefaultConnection: "Host=wallow-postgresql:5432;Database=wallow;Username=wallow;Password=wallow"
  ConnectionStrings__Redis: "wallow-valkey-master:6379"

# -- Enable in-cluster infrastructure subcharts
postgresql:
  enabled: true
  auth:
    username: wallow
    password: wallow
    database: wallow

valkey:
  enabled: true
  auth:
    enabled: false
