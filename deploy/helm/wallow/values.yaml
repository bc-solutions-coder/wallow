# Wallow Helm Chart - Default Values
# Override these in environment-specific values files (values-dev.yaml, values-staging.yaml, etc.)

# -- Container image configuration
image:
  repository: ghcr.io/bc-solutions-coder/wallow
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

# -- Number of replicas (ignored when autoscaling is enabled)
replicaCount: 1

# -- Service configuration
service:
  type: ClusterIP
  port: 8080

# -- Ingress configuration
ingress:
  enabled: false
  className: nginx
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  host: wallow.example.com
  tls:
    enabled: false
    secretName: wallow-tls

# -- Resource requests and limits
resources:
  requests:
    memory: 128Mi
    cpu: 250m
  limits:
    memory: 512Mi
    cpu: 1000m

# -- Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

# -- Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# -- Persistent volume (for local file storage, if needed)
persistence:
  enabled: false
  size: 10Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

# -- Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}

# -- Health check probe paths
health:
  readiness:
    path: /health/ready
    initialDelaySeconds: 10
    periodSeconds: 15
  liveness:
    path: /health/live
    initialDelaySeconds: 15
    periodSeconds: 20
  startup:
    path: /health
    failureThreshold: 30
    periodSeconds: 5

# -- Application configuration (mounted as ConfigMap)
config:
  ASPNETCORE_ENVIRONMENT: Production
  OTEL_EXPORTER_OTLP_ENDPOINT: ""

# -- Sensitive configuration (mounted as Secret)
secrets:
  ConnectionStrings__DefaultConnection: ""
  ConnectionStrings__Redis: ""
  ConnectionStrings__RabbitMq: ""

# -- Subchart toggles (use external services in production)
postgresql:
  enabled: false

rabbitmq:
  enabled: false

valkey:
  enabled: false
