# Wallow Helm Chart - US East Region Overrides
# Usage: helm install wallow ./wallow -f values.yaml -f values-us-east.yaml

replicaCount: 3

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: us-east.wallow.example.com
  tls:
    enabled: true
    secretName: wallow-us-east-tls

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75

config:
  ASPNETCORE_ENVIRONMENT: Production
  WALLOW_REGION: us-east
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability:4317"

secrets:
  ConnectionStrings__DefaultConnection: ""  # Set via --set or external secret
  ConnectionStrings__Redis: ""
  ConnectionStrings__RabbitMq: ""
  AWS__S3__BucketName: "wallow-assets-us-east"
  AWS__S3__Region: "us-east-1"
