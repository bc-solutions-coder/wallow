apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wallow-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - wallow.example.com
      secretName: wallow-tls
  rules:
    - host: wallow.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wallow
                port:
                  number: 80
