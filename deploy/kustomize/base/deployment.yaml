apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallow
  template:
    metadata:
      labels:
        app: wallow
    spec:
      containers:
        - name: wallow
          image: ghcr.io/bc-solutions-coder/wallow:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: wallow-config
            - secretRef:
                name: wallow-secrets
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: 128Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 1000m
