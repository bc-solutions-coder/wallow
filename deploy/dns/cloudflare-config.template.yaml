# Cloudflare Geo-Steering Load Balancer Template
# Reference configuration for DNS-based geo-routing across Wallow regions.
# Replace placeholder values before applying via Cloudflare API or Terraform.

zone:
  domain: "{{DOMAIN}}"                    # e.g., wallow.example.com

health_monitors:
  - name: wallow-health
    type: https
    path: "/health/ready"
    port: 443
    interval: 60
    timeout: 5
    retries: 2
    expected_codes: "200"
    follow_redirects: true
    allow_insecure: false

origin_pools:
  - name: us-east
    origins:
      - name: us-east-primary
        address: "{{US_EAST_ENDPOINT}}"   # e.g., us-east.wallow.example.com
        enabled: true
        weight: 1.0
    enabled: true
    minimum_origins: 1
    monitor: wallow-health
    notification_email: "{{ALERT_EMAIL}}" # e.g., ops@example.com

  - name: eu-west
    origins:
      - name: eu-west-primary
        address: "{{EU_WEST_ENDPOINT}}"   # e.g., eu-west.wallow.example.com
        enabled: true
        weight: 1.0
    enabled: true
    minimum_origins: 1
    monitor: wallow-health
    notification_email: "{{ALERT_EMAIL}}"

  - name: ap-southeast
    origins:
      - name: ap-southeast-primary
        address: "{{AP_SOUTHEAST_ENDPOINT}}" # e.g., ap-southeast.wallow.example.com
        enabled: true
        weight: 1.0
    enabled: true
    minimum_origins: 1
    monitor: wallow-health
    notification_email: "{{ALERT_EMAIL}}"

load_balancer:
  name: "api.{{DOMAIN}}"
  proxied: true
  steering_policy: geo
  default_pools:
    - us-east
    - eu-west
    - ap-southeast
  fallback_pool: us-east
  region_pools:
    WNAM:                                 # Western North America
      - us-east
    ENAM:                                 # Eastern North America
      - us-east
    WEU:                                  # Western Europe
      - eu-west
    EEU:                                  # Eastern Europe
      - eu-west
    SEAS:                                 # Southeast Asia
      - ap-southeast
    NEAS:                                 # Northeast Asia
      - ap-southeast
    OC:                                   # Oceania
      - ap-southeast
  session_affinity: cookie
  session_affinity_ttl: 1800
