# AWS Route 53 Latency-Based Routing Template
# Reference configuration for DNS-based geo-routing across Wallow regions.
# Replace placeholder values before applying via AWS CLI or Terraform.

hosted_zone:
  domain: "{{DOMAIN}}"                    # e.g., wallow.example.com
  comment: "Wallow multi-region routing"

health_checks:
  - id: "{{HEALTH_CHECK_US_EAST}}"
    endpoint: "{{US_EAST_ENDPOINT}}"      # e.g., https://us-east.wallow.example.com
    path: "/health/ready"
    port: 443
    type: HTTPS
    request_interval: 30
    failure_threshold: 3

  - id: "{{HEALTH_CHECK_EU_WEST}}"
    endpoint: "{{EU_WEST_ENDPOINT}}"      # e.g., https://eu-west.wallow.example.com
    path: "/health/ready"
    port: 443
    type: HTTPS
    request_interval: 30
    failure_threshold: 3

  - id: "{{HEALTH_CHECK_AP_SOUTHEAST}}"
    endpoint: "{{AP_SOUTHEAST_ENDPOINT}}" # e.g., https://ap-southeast.wallow.example.com
    path: "/health/ready"
    port: 443
    type: HTTPS
    request_interval: 30
    failure_threshold: 3

record_sets:
  # Latency-based routing sends users to the nearest healthy region
  - name: "api.{{DOMAIN}}"
    type: A
    set_identifier: us-east-1
    region: us-east-1
    alias_target:
      dns_name: "{{US_EAST_ALB_DNS}}"    # e.g., wallow-us-east-123456.us-east-1.elb.amazonaws.com
      hosted_zone_id: "{{US_EAST_ALB_ZONE}}"
      evaluate_target_health: true
    health_check_id: "{{HEALTH_CHECK_US_EAST}}"

  - name: "api.{{DOMAIN}}"
    type: A
    set_identifier: eu-west-1
    region: eu-west-1
    alias_target:
      dns_name: "{{EU_WEST_ALB_DNS}}"
      hosted_zone_id: "{{EU_WEST_ALB_ZONE}}"
      evaluate_target_health: true
    health_check_id: "{{HEALTH_CHECK_EU_WEST}}"

  - name: "api.{{DOMAIN}}"
    type: A
    set_identifier: ap-southeast-1
    region: ap-southeast-1
    alias_target:
      dns_name: "{{AP_SOUTHEAST_ALB_DNS}}"
      hosted_zone_id: "{{AP_SOUTHEAST_ALB_ZONE}}"
      evaluate_target_health: true
    health_check_id: "{{HEALTH_CHECK_AP_SOUTHEAST}}"
