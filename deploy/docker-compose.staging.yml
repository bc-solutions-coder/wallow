# docker-compose.staging.yml
# Staging environment overrides

services:
  app:
    ports:
      - "8082:8080"
    environment:
      Smtp__Host: mailpit
      Smtp__Port: "1025"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    ports:
      - "127.0.0.1:5434:5432"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    ports:
      - "127.0.0.1:5674:5672"
      - "127.0.0.1:15674:15672"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # EMAIL TESTING
  # ============================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-mailpit
    ports:
      - "127.0.0.1:28025:8025"
    networks:
      - wallow
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
