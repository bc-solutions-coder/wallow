# docker-compose.staging.yml
# Staging environment - internal ports only, includes Mailpit for testing

services:
  postgres:
    # No external ports - accessed via internal network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    # Management UI on internal port only
    ports:
      - "127.0.0.1:15672:15672"  # Localhost only for debugging
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Mailpit for staging email testing
  mailpit:
    image: axllent/mailpit:latest
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-mailpit
    ports:
      - "127.0.0.1:8025:8025"  # Localhost only
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/livez"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - wallow
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
