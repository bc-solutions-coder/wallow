# docker-compose.dev.yml
# Development environment - exposes all ports, includes Mailpit

services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"

  # ============================================
  # EMAIL (Development only)
  # ============================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-mailpit
    ports:
      - "127.0.0.1:1025:1025"   # SMTP
      - "127.0.0.1:8025:8025"   # Web UI
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/livez"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - wallow
    restart: unless-stopped

  # ============================================
  # OBJECT STORAGE (GarageHQ)
  # ============================================
  garage:
    ports:
      - "127.0.0.1:3900:3900"   # S3 API
      - "127.0.0.1:3903:3903"   # Admin API
