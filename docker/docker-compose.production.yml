# =============================================================================
# Wallow Production Stack
# =============================================================================
# Fully self-contained — runs locally or on a server with the same command.
# Pangolin handles TLS + routing externally. Containers expose HTTP only.
#
# Usage:
#   cd docker
#   cp .env.production.example .env.production    # edit credentials
#   docker compose -f docker-compose.production.yml --env-file .env.production up --build
#   docker compose -f docker-compose.production.yml --env-file .env.production logs -f
#
# With observability (Grafana + Alloy):
#   docker compose -f docker-compose.production.yml --env-file .env.production \
#     --profile observability up --build
# =============================================================================

configs:
  pg-hba:
    content: |
      # TYPE  DATABASE  USER  ADDRESS  METHOD
      local   all       all            trust
      host    all       all   all      scram-sha-256
      host    replication all all      scram-sha-256

services:
  # ============================================
  # DATABASE (Primary)
  # ============================================
  postgres:
    image: postgres:18-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-postgres
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=4
      -c hot_standby=on
      -c hba_file=/etc/postgresql/pg_hba.conf
    configs:
      - source: pg-hba
        target: /etc/postgresql/pg_hba.conf
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - wallow
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================
  # DATABASE (Read Replica)
  # ============================================
  postgres-replica:
    image: ghcr.io/bc-solutions-coder/wallow-postgres-replica:${VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-postgres-replica
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PRIMARY_HOST: postgres
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - wallow
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================
  # CACHE + SIGNALR BACKPLANE (Valkey)
  # ============================================
  valkey:
    image: valkey/valkey:8.1-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-valkey
    command: valkey-server --appendonly yes --requirepass ${VALKEY_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a ${VALKEY_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - wallow
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================
  # OBJECT STORAGE (GarageHQ — S3-compatible)
  # ============================================
  garage:
    image: ghcr.io/bc-solutions-coder/wallow-garage:${VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-garage
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
      GARAGE_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY}
      GARAGE_KEY_NAME: ${GARAGE_KEY_NAME:-wallow}
      GARAGE_BUCKET: ${GARAGE_BUCKET:-wallow-files}
      GARAGE_REGION: ${GARAGE_REGION:-us-east-1}
      GARAGE_S3_PORT: ${GARAGE_S3_PORT:-3900}
      GARAGE_ADMIN_PORT: ${GARAGE_ADMIN_PORT:-3903}
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    healthcheck:
      test: ["CMD-SHELL", "garage status 2>/dev/null | grep -q ID"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - wallow
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================
  # OBSERVABILITY (optional — use --profile observability)
  # ============================================
  alloy:
    image: grafana/alloy:latest
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
    networks:
      - wallow
    restart: unless-stopped
    profiles: ["observability"]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  grafana-lgtm:
    image: grafana/otel-lgtm:0.8.1
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-grafana-lgtm
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
    depends_on:
      - alloy
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wallow
    restart: unless-stopped
    profiles: ["observability"]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================
  # WALLOW API
  # ============================================
  wallow-api:
    image: ghcr.io/bc-solutions-coder/wallow:${VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-api
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /app/App_Data:uid=0,gid=0
      - /app/certs:uid=0,gid=0
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # OpenIddict certificates (auto-generated on first startup if missing)
      OpenIddict__SigningCertPath: /app/certs/signing.pfx
      OpenIddict__SigningCertPassword: ${OPENIDDICT_SIGNING_CERT_PASSWORD}
      OpenIddict__EncryptionCertPath: /app/certs/encryption.pfx
      OpenIddict__EncryptionCertPassword: ${OPENIDDICT_ENCRYPTION_CERT_PASSWORD}
      # Migrations
      CONNECTION_STRING: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      # Database
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__ReadReplicaConnection: "Host=postgres-replica;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "valkey:6379,password=${VALKEY_PASSWORD},abortConnect=false"
      # SMTP
      Smtp__Host: ${SMTP_HOST}
      Smtp__Port: "${SMTP_PORT}"
      Smtp__UseSsl: "${SMTP_USE_SSL:-true}"
      Smtp__Username: ${SMTP_USERNAME}
      Smtp__Password: ${SMTP_PASSWORD}
      Smtp__DefaultFromAddress: ${SMTP_FROM_ADDRESS}
      Smtp__DefaultFromName: ${SMTP_FROM_NAME}
      # S3 Storage (GarageHQ)
      Storage__Provider: S3
      Storage__S3__Endpoint: http://garage:${GARAGE_S3_PORT:-3900}
      Storage__S3__AccessKey: ${GARAGE_ACCESS_KEY}
      Storage__S3__SecretKey: ${GARAGE_SECRET_KEY}
      Storage__S3__BucketName: ${GARAGE_BUCKET:-wallow-files}
      Storage__S3__UsePathStyle: "true"
      Storage__S3__Region: ${GARAGE_REGION:-us-east-1}
      # Service URLs (public-facing, what browsers see)
      ServiceUrls__AuthUrl: ${AUTH_PUBLIC_URL:-https://auth.wallow.dev}
      ServiceUrls__WebUrl: ${WEB_PUBLIC_URL:-https://wallow.dev}
      OpenIddict__Issuer: ${API_PUBLIC_URL:-https://api.wallow.dev}
      AuthUrl: ${AUTH_PUBLIC_URL:-https://auth.wallow.dev}
      Authentication__CookieDomain: ${COOKIE_DOMAIN:-.wallow.dev}
      # CORS
      Cors__AllowedOrigins__0: ${WEB_PUBLIC_URL:-https://wallow.dev}
      Cors__AllowedOrigins__1: ${AUTH_PUBLIC_URL:-https://auth.wallow.dev}
      # Identity / JWT
      Identity__SigningKey: ${IDENTITY_SIGNING_KEY}
      # Admin bootstrap (applied on first startup, no-op after)
      AdminBootstrap__Email: ${ADMIN_EMAIL}
      AdminBootstrap__Password: ${ADMIN_PASSWORD}
      AdminBootstrap__FirstName: ${ADMIN_FIRST_NAME:-Admin}
      AdminBootstrap__LastName: ${ADMIN_LAST_NAME:-User}
      # Pre-registered OIDC clients
      PreRegisteredClients__Clients__0__ClientId: ${OIDC_CLIENT_ID}
      PreRegisteredClients__Clients__0__DisplayName: Wallow Web
      PreRegisteredClients__Clients__0__Secret: ${OIDC_CLIENT_SECRET}
      PreRegisteredClients__Clients__0__TenantName: Default
      PreRegisteredClients__Clients__0__RedirectUris__0: ${WEB_PUBLIC_URL:-https://wallow.dev}/signin-oidc
      PreRegisteredClients__Clients__0__PostLogoutRedirectUris__0: ${WEB_PUBLIC_URL:-https://wallow.dev}/signout-callback-oidc
      PreRegisteredClients__Clients__0__Scopes__0: openid
      PreRegisteredClients__Clients__0__Scopes__1: email
      PreRegisteredClients__Clients__0__Scopes__2: profile
      PreRegisteredClients__Clients__0__Scopes__3: roles
      PreRegisteredClients__Clients__0__Scopes__4: offline_access
      PreRegisteredClients__Clients__0__SeedMembers__0: ${ADMIN_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy
      valkey:
        condition: service_healthy
      garage:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - wallow
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # WALLOW AUTH
  # ============================================
  wallow-auth:
    image: ghcr.io/bc-solutions-coder/wallow-auth:${VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-auth
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    ports:
      - "${AUTH_PORT:-8081}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # Internal API URL (container-to-container)
      ApiBaseUrl: http://wallow-api:8080
      ServiceUrls__ApiUrl: http://wallow-api:8080
      ServiceUrls__WebUrl: ${WEB_PUBLIC_URL:-https://wallow.dev}
    depends_on:
      wallow-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - wallow
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # WALLOW WEB
  # ============================================
  wallow-web:
    image: ghcr.io/bc-solutions-coder/wallow-web:${VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-web
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    ports:
      - "${WEB_PORT:-8082}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # Internal service URLs (container-to-container)
      ServiceUrls__ApiUrl: http://wallow-api:8080
      ServiceUrls__AuthUrl: http://wallow-auth:8080
      # Public-facing auth URL (for browser redirects)
      ServiceUrls__AuthPublicUrl: ${AUTH_PUBLIC_URL:-https://auth.wallow.dev}
      # OIDC config
      Oidc__Authority: ${API_PUBLIC_URL:-https://api.wallow.dev}
      Oidc__ClientId: ${OIDC_CLIENT_ID}
      Oidc__ClientSecret: ${OIDC_CLIENT_SECRET}
    depends_on:
      wallow-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - wallow
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  postgres_replica_data:
  valkey_data:
  garage_meta:
  garage_data:

networks:
  wallow:
    driver: bridge
