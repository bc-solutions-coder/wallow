# docker-compose.yml
# Base infrastructure services - used by all environments

services:
  # ============================================
  # DATABASE
  # ============================================
  postgres:
    image: postgres:18-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro

    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wallow
    restart: unless-stopped

  # ============================================
  # EMAIL (Development)
  # ============================================
  mailpit:
    image: axllent/mailpit:v1.22
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-mailpit
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks:
      - wallow
    restart: unless-stopped

  # ============================================
  # CACHE & BACKPLANE (Valkey — Redis-compatible)
  # ============================================
  valkey:
    image: valkey/valkey:8-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-valkey
    command: valkey-server --appendonly yes --requirepass ${VALKEY_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - valkey_data:/data
    environment:
      REDISCLI_AUTH: ${VALKEY_PASSWORD}
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wallow
    restart: unless-stopped

  # ============================================
  # OBSERVABILITY
  # ============================================
  # The Wallow API (run via dotnet run, not in Docker) needs these
  # environment variables to export telemetry to the OTLP collector:
  #
  #   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317
  #   OTEL_SERVICE_NAME=wallow-api
  #
  # OTEL_EXPORTER_OTLP_ENDPOINT — gRPC endpoint exposed by Alloy collector
  # OTEL_SERVICE_NAME           — logical service name shown in traces/metrics
  # ============================================
  grafana-lgtm:
    image: grafana/otel-lgtm:0.8.1
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-grafana-lgtm
    ports:
      - "127.0.0.1:3000:3000"   # Grafana UI
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
    volumes:
      # Mount custom dashboards into grafana-lgtm's provisioning path
      - ./grafana/provisioning/dashboards/dashboards.yml:/otel-lgtm/grafana/conf/provisioning/dashboards/wallow-dashboards.yaml:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wallow
    restart: unless-stopped

  # ============================================
  # OTLP COLLECTOR (Grafana Alloy)
  # ============================================
  alloy:
    image: grafana/alloy:latest
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-alloy
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "127.0.0.1:4318:4318"   # OTLP HTTP
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
    depends_on:
      grafana-lgtm:
        condition: service_healthy
    networks:
      - wallow
    restart: unless-stopped

  # ============================================
  # ANTIVIRUS (ClamAV)
  # ============================================
  clamav:
    image: clamav/clamav:1.5.2
    platform: linux/amd64
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-clamav
    ports:
      - "127.0.0.1:3310:3310"
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wallow
    restart: unless-stopped

volumes:
  postgres_data:
  valkey_data:

networks:
  wallow:
    driver: bridge
