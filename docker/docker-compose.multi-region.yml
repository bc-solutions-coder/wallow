# docker-compose.multi-region.yml
# Simulates multi-region RabbitMQ federation with two instances
# Usage: docker compose -f docker-compose.yml -f docker-compose.multi-region.yml up -d

services:
  # ============================================
  # PRIMARY RABBITMQ (simulates Region A)
  # ============================================
  rabbitmq:
    image: rabbitmq:4.2-management-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-rabbitmq-primary
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_primary_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions-federation.json:/etc/rabbitmq/definitions.json:ro
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wallow
    restart: unless-stopped

  # ============================================
  # REPLICA RABBITMQ (simulates Region B)
  # ============================================
  rabbitmq-replica:
    image: rabbitmq:4.2-management-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-rabbitmq-replica
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_replica_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    ports:
      - "5673:5672"    # AMQP (offset port)
      - "15673:15672"  # Management UI (offset port)
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wallow
    restart: unless-stopped

volumes:
  rabbitmq_primary_data:
  rabbitmq_replica_data:
