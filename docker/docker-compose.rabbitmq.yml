# docker-compose.rabbitmq.yml
# Opt-in RabbitMQ service — use when ModuleMessaging:Transport is set to "RabbitMq"
#
# Usage:
#   cd docker && docker compose -f docker-compose.yml -f docker-compose.rabbitmq.yml up -d

services:
  rabbitmq:
    image: rabbitmq:4.2-management-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wallow
    restart: unless-stopped

volumes:
  rabbitmq_data:

networks:
  wallow:
    driver: bridge
