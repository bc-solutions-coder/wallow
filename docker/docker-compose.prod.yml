# docker-compose.prod.yml
# Production environment - no Mailpit, external secrets, enhanced logging

services:
  postgres:
    # No external ports
    ports: !reset []
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=4
      -c hot_standby=on
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================================
  # DATABASE READ REPLICA
  # ============================================
  postgres-replica:
    image: postgres:18-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-wallow}-postgres-replica
    user: postgres
    security_opt:
      - no-new-privileges:true
    entrypoint: ["/bin/bash", "/init-replica.sh"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./init-replica.sh:/init-replica.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - wallow
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  valkey:
    image: valkey/valkey:8.1-alpine
    command: valkey-server --requirepass ${VALKEY_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports: !reset []
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # GarageHQ for production S3-compatible storage
  # For managed S3 (AWS, Cloudflare R2), remove this service and configure
  # Storage__S3__Endpoint via environment variables instead.
  garage:
    ports: !reset []
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M

  # No Mailpit in production - use real SMTP service

  wallow-api:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    ports:
      - "${API_PORT:-5000}:8080"
    environment:
      - ServiceUrls__AuthUrl=http://wallow-auth:8080
      - ServiceUrls__WebUrl=http://wallow-web:8080
      - ConnectionStrings__ReadReplicaConnection=Host=postgres-replica;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  wallow-auth:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    ports:
      - "${AUTH_PORT:-5001}:8080"
    environment:
      - ServiceUrls__ApiUrl=http://wallow-api:8080
      - ServiceUrls__WebUrl=http://wallow-web:8080
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  wallow-web:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    ports:
      - "${WEB_PORT:-5003}:8080"
    environment:
      - ServiceUrls__ApiUrl=http://wallow-api:8080
      - ServiceUrls__AuthUrl=http://wallow-auth:8080
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_replica_data:
