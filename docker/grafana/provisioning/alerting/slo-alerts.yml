apiVersion: 1

groups:
  - orgId: 1
    name: SLO Violations
    folder: Foundry Alerts
    interval: 1m
    rules:
      - uid: slo-api-p99-latency
        title: API P99 Latency Exceeds 2s
        condition: threshold
        for: 5m
        labels:
          severity: warning
          service: foundry-api
          slo: latency
        annotations:
          summary: API P99 latency is above 2s SLO threshold
          description: "P99 latency is {{ $value }}ms, exceeding the 2000ms SLO target over a 5-minute window."
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: histogram_quantile(0.99, sum(rate(http_server_request_duration_seconds_bucket[5m])) by (le)) * 1000
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: threshold
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 2000
                  operator:
                    type: and
                  query:
                    params:
                      - A
              expression: A

      - uid: slo-api-error-rate
        title: API Error Rate Exceeds 1%
        condition: threshold
        for: 5m
        labels:
          severity: critical
          service: foundry-api
          slo: availability
        annotations:
          summary: API error rate is above 1% SLO threshold
          description: "Error rate is {{ $value | printf \"%.4f\" }}, exceeding the 0.01 (1%) SLO target over a 5-minute window."
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m])) / sum(rate(http_server_request_duration_seconds_count[5m]))
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: threshold
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0.01
                  operator:
                    type: and
                  query:
                    params:
                      - A
              expression: A

      - uid: slo-transaction-p95-latency
        title: Transaction Processing P95 Exceeds 2s
        condition: threshold
        for: 5m
        labels:
          severity: warning
          service: foundry-api
          slo: transaction-latency
        annotations:
          summary: Transaction P95 latency is above 2s SLO threshold
          description: "Transaction P95 latency is {{ $value }}ms, exceeding the 2000ms SLO target over a 5-minute window."
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket{http_route=~".*[Tt]ransaction.*"}[5m])) by (le)) * 1000
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: threshold
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 2000
                  operator:
                    type: and
                  query:
                    params:
                      - A
              expression: A

      - uid: slo-sso-failure-spike
        title: SSO Login Failure Rate Spike
        condition: threshold
        for: 5m
        labels:
          severity: critical
          service: foundry-identity
          slo: sso-availability
        annotations:
          summary: SSO login failure rate is spiking
          description: "SSO error ratio is {{ $value | printf \"%.4f\" }}, indicating a failure spike on SSO/login endpoints over a 5-minute window."
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: sum(rate(http_server_request_duration_seconds_count{http_route=~".*[Ss]so.*|.*[Ll]ogin.*", http_response_status_code=~"[45].."}[5m])) / sum(rate(http_server_request_duration_seconds_count{http_route=~".*[Ss]so.*|.*[Ll]ogin.*"}[5m]))
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: threshold
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0.05
                  operator:
                    type: and
                  query:
                    params:
                      - A
              expression: A

      - uid: slo-wolverine-error-rate
        title: Wolverine Message Processing Error Rate Exceeds 5%
        condition: threshold
        for: 5m
        labels:
          severity: critical
          service: foundry-messaging
          slo: messaging-reliability
        annotations:
          summary: Wolverine message processing error rate is above 5% SLO threshold
          description: "Message processing error rate is {{ $value | printf \"%.4f\" }}, exceeding the 0.05 (5%) SLO target over a 5-minute window."
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: sum(rate(foundry_messaging_messages_total{status="error"}[5m])) / sum(rate(foundry_messaging_messages_total[5m]))
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: threshold
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0.05
                  operator:
                    type: and
                  query:
                    params:
                      - A
              expression: A
