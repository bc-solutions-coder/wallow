# docker-compose.test.yml
# Test environment - extends base infrastructure with application services
# Uses separate ports and volume namespace to avoid conflicts with dev environment

services:
  # ============================================
  # INFRASTRUCTURE (from base compose)
  # ============================================
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: wallow_test
      POSTGRES_PASSWORD: wallow_test
      POSTGRES_DB: wallow_test
      # postgres:18+ moved the default data dir; pin the pre-18 path for the volume.
      PGDATA: /var/lib/postgresql/data
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5442:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallow_test -d wallow_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wallow-test

  valkey:
    image: valkey/valkey:8-alpine
    command: valkey-server --appendonly yes --requirepass WallowTestValkey123!
    ports:
      - "127.0.0.1:6389:6379"
    volumes:
      - test_valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "WallowTestValkey123!", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wallow-test

  mailpit:
    image: axllent/mailpit:v1.22
    ports:
      - "127.0.0.1:1035:1025"
      - "127.0.0.1:8035:8025"
    networks:
      - wallow-test

  garage:
    image: wallow-garage:test
    build:
      context: ./images/garage
    environment:
      GARAGE_RPC_SECRET: abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789
      GARAGE_ADMIN_TOKEN: test-admin-token
      GARAGE_KEY_NAME: wallow-test
      GARAGE_ACCESS_KEY: GK0123456789abcdef01234567
      GARAGE_SECRET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      GARAGE_BUCKET: wallow-test-files
    volumes:
      - test_garage_meta:/var/lib/garage/meta
      - test_garage_data:/var/lib/garage/data
    ports:
      - "127.0.0.1:3910:3900"
      - "127.0.0.1:3913:3903"
    healthcheck:
      test: ["CMD", "garage", "status"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wallow-test

  # ============================================
  # MIGRATIONS
  # ============================================
  wallow-migrations:
    image: wallow-migrations:test
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=wallow_test;Username=wallow_test;Password=wallow_test"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wallow-test

  # ============================================
  # SEEDER
  # ============================================
  wallow-seeder:
    image: wallow-seeder:test
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=wallow_test;Username=wallow_test;Password=wallow_test"
      # Override wallow-web-client redirect URIs for test ports
      Clients__1__RedirectUris__0: "http://localhost:5053/signin-oidc"
      Clients__1__PostLogoutRedirectUris__0: "http://localhost:5053/signout-callback-oidc"
    depends_on:
      wallow-migrations:
        condition: service_completed_successfully
    networks:
      - wallow-test

  # ============================================
  # APPLICATION SERVICES
  # ============================================
  wallow-api:
    image: wallow-api:test
    ports:
      - "5050:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      # Override HTTPS_PORT from appsettings.Development.json to prevent HTTPS redirect
      HTTPS_PORT: ""
      CONNECTION_STRING: "Host=postgres;Port=5432;Database=wallow_test;Username=wallow_test;Password=wallow_test"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=wallow_test;Username=wallow_test;Password=wallow_test"
      ConnectionStrings__Redis: "valkey:6379,password=WallowTestValkey123!,abortConnect=false"
      OPENIDDICT_SIGNING_CERT_PASSWORD: test-signing
      OPENIDDICT_ENCRYPTION_CERT_PASSWORD: test-encryption
      Smtp__Host: mailpit
      Smtp__Port: "1025"
      Storage__Provider: S3
      Storage__S3__Endpoint: "http://garage:3900"
      Storage__S3__AccessKey: GK0123456789abcdef01234567
      Storage__S3__SecretKey: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      Storage__S3__BucketName: wallow-test-files
      Storage__S3__UsePathStyle: "true"
      Storage__S3__Region: us-east-1
      # Auth URL for link generation (browser-accessible from host)
      AuthUrl: "http://localhost:5051"
      ServiceUrls__AuthUrl: "http://localhost:5051"
      # API URL for link generation (browser-accessible from host, e.g. magic link emails)
      ServiceUrls__ApiUrl: "http://localhost:5050"
      # Fix OIDC issuer so browser-facing tokens match the authority clients expect (localhost)
      OpenIddict__Issuer: "http://localhost:5050"
      # Treat the seeded BFF client as first-party so the OIDC flow skips the
      # interactive consent screen (appsettings already lists bcordes-dev-client
      # at index 0; this appends the tanstack-min example's client at index 1).
      Identity__FirstPartyClients__1: "bcordes-bff"
    tmpfs:
      - /tmp
      - /app/App_Data
      - /app/certs
    depends_on:
      wallow-seeder:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      garage:
        condition: service_healthy
    networks:
      - wallow-test

  wallow-auth:
    image: wallow-auth:test
    ports:
      - "127.0.0.1:5051:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      # Public URL for browser redirects (ticket exchange after login)
      ApiBaseUrl: "http://localhost:5050"
      # Internal URL for server-to-server calls (container-to-container)
      ServiceUrls__ApiUrl: "http://wallow-api:8080"
      # .NET Aspire service discovery resolution for container-to-container communication
      services__wallow-api__http__0: "http://wallow-api:8080"
      ConnectionStrings__Redis: "valkey:6379,password=WallowTestValkey123!,abortConnect=false"
    depends_on:
      - wallow-api
      - valkey
    networks:
      - wallow-test

  wallow-web:
    image: wallow-web:test
    ports:
      - "127.0.0.1:5053:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ServiceUrls__ApiUrl: "http://wallow-api:8080"
      ServiceUrls__AuthUrl: "http://wallow-auth:8080"
      ServiceUrls__AuthPublicUrl: "http://localhost:5051"
      # .NET Aspire service discovery resolution for container-to-container communication
      services__wallow-api__http__0: "http://wallow-api:8080"
      # Authority = browser-facing URL (must match API's OpenIddict issuer for same-site cookies)
      # MetadataAddress = container-reachable URL for OIDC discovery (host.docker.internal)
      Oidc__Authority: "http://localhost:5050"
      Oidc__MetadataAddress: "http://host.docker.internal:5050/.well-known/openid-configuration"
      Oidc__ClientId: wallow-web-client
      Oidc__ClientSecret: wallow-web-secret
      ConnectionStrings__Redis: "valkey:6379,password=WallowTestValkey123!,abortConnect=false"
    depends_on:
      - wallow-api
      - valkey
    networks:
      - wallow-test

  # ============================================
  # BFF REFERENCE EXAMPLE (@wallow/sdk tanstack-min)
  # ============================================
  # Node process that hosts the SDK BFF tunnel for the BffFlowTests E2E flow.
  # Build context is the repo root so the Dockerfile can build the @wallow/sdk
  # workspace dependency alongside the example.
  #
  # OIDC issuer vs discovery-metadata split (mirrors wallow-web):
  #   - OIDC_ISSUER = http://localhost:5050 is the browser-facing issuer origin
  #     (matches the API's OpenIddict issuer), used to build authorize/end-session
  #     redirect URLs the browser follows.
  #   - OIDC_METADATA_URL = http://host.docker.internal:5050/... is the
  #     server-reachable discovery URL. The SDK fetches discovery from it and
  #     rewrites the backchannel token_endpoint to that origin, so container-side
  #     code exchange and silent refresh reach the API published on the host.
  bff-example:
    image: wallow-bff-example:test
    build:
      context: ..
      dockerfile: packages/typescript-sdk/examples/tanstack-min/Dockerfile
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "3000"
      # Browser-facing issuer (must match API OpenIddict issuer for redirects)
      OIDC_ISSUER: "http://localhost:5050"
      # Server-reachable discovery URL (container -> host-published API).
      # The SDK uses this metadata's token_endpoint for the backchannel and pins
      # the browser-facing authorize/end-session endpoints to OIDC_ISSUER.
      OIDC_METADATA_URL: "http://host.docker.internal:5050/.well-known/openid-configuration"
      OIDC_CLIENT_ID: bcordes-bff
      OIDC_CLIENT_SECRET: bcordes-bff-secret
      OIDC_REDIRECT_URI: "http://localhost:3000/bff/callback"
      OIDC_POST_LOGOUT_REDIRECT_URI: "http://localhost:3000/"
      # Downstream API for the /api proxy (container-to-container)
      BFF_API_BASE_URL: "http://wallow-api:8080"
      COOKIE_PASSWORD: "e2e-bff-cookie-seal-password-min-32-chars"
    depends_on:
      - wallow-api
      - wallow-auth
    networks:
      - wallow-test

volumes:
  test_postgres_data:
  test_valkey_data:
  test_garage_meta:
  test_garage_data:

networks:
  wallow-test:
    driver: bridge
