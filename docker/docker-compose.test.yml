# docker-compose.test.yml
# Test environment - extends base infrastructure with application services
# Uses separate ports and volume namespace to avoid conflicts with dev environment

services:
  # ============================================
  # INFRASTRUCTURE (from base compose)
  # ============================================
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: wallow_test
      POSTGRES_PASSWORD: wallow_test
      POSTGRES_DB: wallow_test
      # postgres:18+ moved the default data dir; pin the pre-18 path for the volume.
      PGDATA: /var/lib/postgresql/data
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5442:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallow_test -d wallow_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wallow-test

  valkey:
    image: valkey/valkey:8-alpine
    command: valkey-server --appendonly yes --requirepass WallowTestValkey123!
    ports:
      - "127.0.0.1:6389:6379"
    volumes:
      - test_valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "WallowTestValkey123!", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wallow-test

  mailpit:
    image: axllent/mailpit:v1.22
    ports:
      - "127.0.0.1:1035:1025"
      - "127.0.0.1:8035:8025"
    networks:
      - wallow-test

  garage:
    image: wallow-garage:test
    build:
      context: ./images/garage
    environment:
      GARAGE_RPC_SECRET: abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789
      GARAGE_ADMIN_TOKEN: test-admin-token
      GARAGE_KEY_NAME: wallow-test
      GARAGE_ACCESS_KEY: GK0123456789abcdef01234567
      GARAGE_SECRET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      GARAGE_BUCKET: wallow-test-files
    volumes:
      - test_garage_meta:/var/lib/garage/meta
      - test_garage_data:/var/lib/garage/data
    ports:
      - "127.0.0.1:3910:3900"
      - "127.0.0.1:3913:3903"
    healthcheck:
      test: ["CMD", "garage", "status"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wallow-test

  # ============================================
  # MIGRATIONS
  # ============================================
  wallow-migrations:
    image: wallow-migrations:test
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=wallow_test;Username=wallow_test;Password=wallow_test"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wallow-test

  # ============================================
  # SEEDER
  # ============================================
  wallow-seeder:
    image: wallow-seeder:test
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=wallow_test;Username=wallow_test;Password=wallow_test"
      # Override wallow-web-client redirect URIs for the test port. The client is
      # now a Node BFF (apps/wallow-web), so the callback is /bff/callback, not the
      # Blazor /signin-oidc middleware path.
      Clients__1__RedirectUris__0: "http://localhost:5053/bff/callback"
      Clients__1__PostLogoutRedirectUris__0: "http://localhost:5053/"
    depends_on:
      wallow-migrations:
        condition: service_completed_successfully
    networks:
      - wallow-test

  # ============================================
  # APPLICATION SERVICES
  # ============================================
  wallow-api:
    image: wallow-api:test
    ports:
      - "5050:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      # Override HTTPS_PORT from appsettings.Development.json to prevent HTTPS redirect
      HTTPS_PORT: ""
      CONNECTION_STRING: "Host=postgres;Port=5432;Database=wallow_test;Username=wallow_test;Password=wallow_test"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=wallow_test;Username=wallow_test;Password=wallow_test"
      ConnectionStrings__Redis: "valkey:6379,password=WallowTestValkey123!,abortConnect=false"
      OPENIDDICT_SIGNING_CERT_PASSWORD: test-signing
      OPENIDDICT_ENCRYPTION_CERT_PASSWORD: test-encryption
      Smtp__Host: mailpit
      Smtp__Port: "1025"
      Storage__Provider: S3
      Storage__S3__Endpoint: "http://garage:3900"
      Storage__S3__AccessKey: GK0123456789abcdef01234567
      Storage__S3__SecretKey: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      Storage__S3__BucketName: wallow-test-files
      Storage__S3__UsePathStyle: "true"
      Storage__S3__Region: us-east-1
      # Auth URL for link generation (browser-accessible from host)
      AuthUrl: "http://localhost:5051"
      ServiceUrls__AuthUrl: "http://localhost:5051"
      # API URL for link generation (browser-accessible from host, e.g. magic link emails)
      ServiceUrls__ApiUrl: "http://localhost:5050"
      # Fix OIDC issuer so browser-facing tokens match the authority clients expect (localhost)
      OpenIddict__Issuer: "http://localhost:5050"
      # Treat the seeded BFF client as first-party so the OIDC flow skips the
      # interactive consent screen (appsettings already lists bcordes-dev-client
      # at index 0; this appends the wallow-web example's client at index 1).
      Identity__FirstPartyClients__1: "bcordes-bff"
      # wallow-web is now a BFF too; treat its client as first-party so the OIDC
      # flow skips the interactive consent screen during the dashboard login.
      Identity__FirstPartyClients__2: "wallow-web-client"
    tmpfs:
      - /tmp
      - /app/App_Data
      - /app/certs
    depends_on:
      wallow-seeder:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      garage:
        condition: service_healthy
    networks:
      - wallow-test

  # apps/wallow-auth (TanStack Start SSR + reverse proxy), not the legacy Blazor
  # Wallow.Auth image. Build context is the repo root so the Dockerfile can build
  # the @bc-solutions-coder/sdk workspace dependency alongside the app.
  #
  # The image tag is deliberately distinct from the legacy wallow-auth:test so a
  # stale Blazor image can never be silently reused for this service.
  #
  # This app is a PURE reverse proxy, not a BFF: it holds no session and no cookie
  # jar, so it needs none of the Blazor app's ASPNETCORE_*/ServiceUrls__*/Redis
  # configuration. It reads exactly three env vars (server.ts, auth-server.ts):
  # PORT, HOST, and WALLOW_API_INTERNAL_URL.
  wallow-auth:
    image: wallow-auth-react:test
    build:
      context: ..
      dockerfile: apps/wallow-auth/Dockerfile
    # Host port stays 5051 (the E2E stack's auth URL); the container port is
    # 3002, this app's Node port, not the Blazor 8080.
    ports:
      - "127.0.0.1:5051:3002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "3002"
      # Upstream for the /v1/**, /connect/**, /.well-known/** reverse proxy
      # (container-to-container).
      WALLOW_API_INTERNAL_URL: "http://wallow-api:8080"
    # node:24-slim ships no curl/wget, so liveness is probed with node's own fetch.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3002/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      - wallow-api
    networks:
      - wallow-test

  # apps/wallow-web (TanStack Start SSR + BFF tunnel), not the legacy Blazor
  # Wallow.Web image. Build context is the repo root so the Dockerfile can build
  # the @bc-solutions-coder/sdk workspace dependency alongside the app.
  #
  # The image tag is deliberately distinct from the legacy wallow-web:test so a
  # stale Blazor image can never be silently reused for this service. This tag
  # (wallow-web-react:test) MUST match the tag ci.yml builds/saves/loads;
  # otherwise compose rebuilds the image from scratch at runtime instead of
  # reusing the cached one.
  #
  # This is the same Node BFF host as bff-example, but authenticates as the
  # seeded wallow-web-client (the canonical dashboard client) rather than the
  # bcordes-bff reference client. The OIDC issuer/metadata split mirrors
  # bff-example (browser-facing issuer vs container-reachable discovery URL).
  wallow-web:
    image: wallow-web-react:test
    build:
      context: ..
      dockerfile: apps/wallow-web/Dockerfile
    ports:
      - "127.0.0.1:5053:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "3000"
      # Browser-facing issuer (must match API OpenIddict issuer for redirects)
      OIDC_ISSUER: "http://localhost:5050"
      # Server-reachable discovery URL (container -> host-published API)
      OIDC_METADATA_URL: "http://host.docker.internal:5050/.well-known/openid-configuration"
      OIDC_CLIENT_ID: wallow-web-client
      OIDC_CLIENT_SECRET: wallow-web-secret
      OIDC_REDIRECT_URI: "http://localhost:5053/bff/callback"
      OIDC_POST_LOGOUT_REDIRECT_URI: "http://localhost:5053/"
      # Downstream API for the /api proxy (container-to-container)
      BFF_API_BASE_URL: "http://wallow-api:8080"
      COOKIE_PASSWORD: "e2e-web-cookie-seal-password-min-32-chars"
      # Server-side sessions in Valkey so logout truly revokes (see bff-example).
      REDIS_URL: "redis://:WallowTestValkey123!@valkey:6379"
    # node:24-slim ships no curl/wget, so liveness is probed with node's own fetch.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      - wallow-api
      - wallow-auth
      - valkey
    networks:
      - wallow-test

  # ============================================
  # BFF REFERENCE EXAMPLE (@bc-solutions-coder/sdk wallow-web)
  # ============================================
  # Node process that hosts the SDK BFF tunnel for the BffFlowTests E2E flow.
  # Build context is the repo root so the Dockerfile can build the @bc-solutions-coder/sdk
  # workspace dependency alongside the example.
  #
  # OIDC issuer vs discovery-metadata split (mirrors wallow-web):
  #   - OIDC_ISSUER = http://localhost:5050 is the browser-facing issuer origin
  #     (matches the API's OpenIddict issuer), used to build authorize/end-session
  #     redirect URLs the browser follows.
  #   - OIDC_METADATA_URL = http://host.docker.internal:5050/... is the
  #     server-reachable discovery URL. The SDK fetches discovery from it and
  #     rewrites the backchannel token_endpoint to that origin, so container-side
  #     code exchange and silent refresh reach the API published on the host.
  bff-example:
    image: wallow-bff-example:test
    build:
      context: ..
      dockerfile: apps/wallow-web/Dockerfile
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "3000"
      # Browser-facing issuer (must match API OpenIddict issuer for redirects)
      OIDC_ISSUER: "http://localhost:5050"
      # Server-reachable discovery URL (container -> host-published API).
      # The SDK uses this metadata's token_endpoint for the backchannel and pins
      # the browser-facing authorize/end-session endpoints to OIDC_ISSUER.
      OIDC_METADATA_URL: "http://host.docker.internal:5050/.well-known/openid-configuration"
      OIDC_CLIENT_ID: bcordes-bff
      OIDC_CLIENT_SECRET: bcordes-bff-secret
      OIDC_REDIRECT_URI: "http://localhost:3000/bff/callback"
      OIDC_POST_LOGOUT_REDIRECT_URI: "http://localhost:3000/"
      # Downstream API for the /api proxy (container-to-container)
      BFF_API_BASE_URL: "http://wallow-api:8080"
      COOKIE_PASSWORD: "e2e-bff-cookie-seal-password-min-32-chars"
      # Server-side sessions in Valkey: the cookie becomes an opaque ref and the
      # tokens live in Valkey, so logout truly revokes. Without this the example
      # falls back to the stateless cookie store.
      REDIS_URL: "redis://:WallowTestValkey123!@valkey:6379"
    depends_on:
      - wallow-api
      - wallow-auth
      - valkey
    networks:
      - wallow-test

volumes:
  test_postgres_data:
  test_valkey_data:
  test_garage_meta:
  test_garage_data:

networks:
  wallow-test:
    driver: bridge
