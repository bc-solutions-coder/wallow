version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      microsoft-packages:
        patterns:
          - "microsoft-*"
          - "aspnet-*"
      ef-core:
        patterns:
          - "*entityframework*"
      test-packages:
        patterns:
          - "xunit*"
          - "coverlet*"
          - "moq*"
