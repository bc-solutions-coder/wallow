name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**/*.cs'
      - 'branding.json'
      - 'docfx.json'
      - 'docfx/templates/**'
      - 'scripts/generate-docs-theme.mjs'
      - 'docker/docs/**'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**/*.cs'
      - 'branding.json'
      - 'docfx.json'
      - 'docfx/templates/**'
      - 'scripts/generate-docs-theme.mjs'
      - 'docker/docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-docs

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-docs
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push docs image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/docs/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docs
          cache-to: type=gha,mode=max,scope=docs

  build-site:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Generate theme CSS
        run: |
          mkdir -p docfx/templates/wallow/public
          node scripts/generate-docs-theme.mjs

      - name: Restore tools and build docs
        run: |
          dotnet restore
          dotnet tool restore
          dotnet docfx docfx.json

      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: docfx-site
          path: .docfx/_site

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-site
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: docfx-site
          path: .docfx/_site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .docfx/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
