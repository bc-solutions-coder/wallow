# Deploy - builds and pushes container images to GHCR after PRs merge to main
#
# This is the deploy step, not CI. No tests run here — they already passed
# on the PR. This workflow builds container images and pushes them to the
# registry with :nightly and :sha tags.
#
# Skips release-please merges (only version/changelog changes — no new images needed).
# The publish workflow (publish.yml) promotes :sha to :latest and semver on release.
#
# Tag tiers:
#   :nightly       — latest main commit (may be broken)
#   :latest        — current released version (set by publish.yml)
#   :X.Y.Z / :X.Y — pinned semver versions (set by publish.yml)

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.gate.outputs.should_deploy }}
    steps:
      - name: Check if deploy is needed
        id: gate
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          if [[ "$COMMIT_MSG" == "chore(main): release"* ]] && \
             [[ "$COMMIT_AUTHOR" == "github-actions[bot]" || "$COMMIT_AUTHOR" == "release-please[bot]" ]]; then
            echo "::notice::Skipping deploy for release-please merge (only version/changelog changes)"
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore previous build output
        uses: actions/cache/restore@v5
        with:
          path: |
            **/bin/Release
            **/obj
          key: build-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            build-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release --graph

      - name: Cache build output
        uses: actions/cache/save@v5
        with:
          path: |
            **/bin/Release
            **/obj
          key: build-${{ runner.os }}-${{ github.sha }}

  docker-images-app:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore build output
        uses: actions/cache/restore@v5
        with:
          path: |
            **/bin/Release
            **/obj
          key: build-${{ runner.os }}-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Publish app container images
        run: |
          dotnet publish src/Wallow.Api/Wallow.Api.csproj \
            -c Release --no-build /t:PublishContainer \
            -p:ContainerImageTag=test \
            -p:ContainerRuntimeIdentifier=linux-x64
          dotnet publish src/Wallow.Auth/Wallow.Auth.csproj \
            -c Release --no-build /t:PublishContainer \
            -p:ContainerImageTag=test \
            -p:ContainerRuntimeIdentifier=linux-x64
          dotnet publish src/Wallow.Web/Wallow.Web.csproj \
            -c Release --no-build /t:PublishContainer \
            -p:ContainerImageTag=test \
            -p:ContainerRuntimeIdentifier=linux-x64
          dotnet publish src/Wallow.MigrationService/Wallow.MigrationService.csproj \
            -c Release --no-build /t:PublishContainer \
            -p:ContainerImageTag=test \
            -p:ContainerRuntimeIdentifier=linux-x64

          dotnet publish src/Wallow.Api/Wallow.Api.csproj \
            -c Release --no-build /t:PublishContainer \
            -p:ContainerImageTag=test-arm64 \
            -p:ContainerRuntimeIdentifier=linux-arm64
          dotnet publish src/Wallow.Auth/Wallow.Auth.csproj \
            -c Release --no-build /t:PublishContainer \
            -p:ContainerImageTag=test-arm64 \
            -p:ContainerRuntimeIdentifier=linux-arm64
          dotnet publish src/Wallow.Web/Wallow.Web.csproj \
            -c Release --no-build /t:PublishContainer \
            -p:ContainerImageTag=test-arm64 \
            -p:ContainerRuntimeIdentifier=linux-arm64
          dotnet publish src/Wallow.MigrationService/Wallow.MigrationService.csproj \
            -c Release --no-build /t:PublishContainer \
            -p:ContainerImageTag=test-arm64 \
            -p:ContainerRuntimeIdentifier=linux-arm64

      - name: Save app images
        run: |
          docker save \
            wallow-api:test wallow-api:test-arm64 \
            wallow-auth:test wallow-auth:test-arm64 \
            wallow-web:test wallow-web:test-arm64 \
            wallow-migrations:test wallow-migrations:test-arm64 \
            | gzip > /tmp/wallow-images-app.tar.gz

      - name: Cache app images
        uses: actions/cache/save@v5
        with:
          path: /tmp/wallow-images-app.tar.gz
          key: images-app-${{ github.sha }}

  docker-images-infra:
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Build infra images
        run: |
          docker compose -f docker/docker-compose.test.yml build garage
          docker build -t wallow-postgres-replica:latest docker/images/postgres-replica

      - name: Save infra images
        run: |
          docker save \
            wallow-garage:test wallow-postgres-replica:latest \
            | gzip > /tmp/wallow-images-infra.tar.gz

      - name: Cache infra images
        uses: actions/cache/save@v5
        with:
          path: /tmp/wallow-images-infra.tar.gz
          key: images-infra-${{ github.sha }}

  push-images:
    needs: [docker-images-app, docker-images-infra]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Restore app images
        uses: actions/cache/restore@v5
        with:
          path: /tmp/wallow-images-app.tar.gz
          key: images-app-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Restore infra images
        uses: actions/cache/restore@v5
        with:
          path: /tmp/wallow-images-infra.tar.gz
          key: images-infra-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Load container images
        run: |
          docker load < /tmp/wallow-images-app.tar.gz
          docker load < /tmp/wallow-images-infra.tar.gz

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Tag and push images to GHCR
        env:
          IMAGE_BASE: ghcr.io/${{ github.repository }}
          SHA_TAG: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA_TAG:0:7}"

          declare -A APP_IMAGE_MAP=(
            ["wallow-api"]="${IMAGE_BASE}"
            ["wallow-auth"]="${IMAGE_BASE}-auth"
            ["wallow-web"]="${IMAGE_BASE}-web"
            ["wallow-migrations"]="${IMAGE_BASE}-migrations"
          )
          for local_name in "${!APP_IMAGE_MAP[@]}"; do
            remote="${APP_IMAGE_MAP[$local_name]}"

            docker tag "${local_name}:test" "${remote}:${SHORT_SHA}-amd64"
            docker push "${remote}:${SHORT_SHA}-amd64"
            docker tag "${local_name}:test-arm64" "${remote}:${SHORT_SHA}-arm64"
            docker push "${remote}:${SHORT_SHA}-arm64"

            for tag in nightly "${SHORT_SHA}"; do
              docker manifest create "${remote}:${tag}" \
                "${remote}:${SHORT_SHA}-amd64" \
                "${remote}:${SHORT_SHA}-arm64"
              docker manifest push "${remote}:${tag}"
            done

            echo "Pushed multi-arch ${remote}:nightly and ${remote}:${SHORT_SHA}"
          done

          docker buildx build --platform linux/amd64,linux/arm64 \
            --tag "${IMAGE_BASE}-garage:nightly" \
            --tag "${IMAGE_BASE}-garage:${SHORT_SHA}" \
            --push docker/images/garage

          docker buildx build --platform linux/amd64,linux/arm64 \
            --tag "${IMAGE_BASE}-postgres-replica:nightly" \
            --tag "${IMAGE_BASE}-postgres-replica:${SHORT_SHA}" \
            --push docker/images/postgres-replica

          echo "Pushed multi-arch infra images (garage, postgres-replica) as :nightly and :${SHORT_SHA}"
