# SDK Publish - publishes @bc-solutions-coder/sdk to GitHub Packages on release or manual dispatch.

name: SDK Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.3). Leave empty to publish package.json version as-is.'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript-sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@bc-solutions-coder'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Sync package version from release tag or input
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ inputs.version }}"
          fi
          if [ -z "$VERSION" ]; then
            echo "No version provided (empty release tag and input); publishing package.json version as-is."
          else
            echo "Setting package version to $VERSION"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
          fi

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
