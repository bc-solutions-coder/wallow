# SDK Publish - publishes @bc-solutions-coder/sdk to GitHub Packages.
# Decoupled from the platform release-please vX.Y.Z releases: the SDK is
# published only by pushing an sdk-v* tag or by manual dispatch with a version.

name: SDK Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SDK version to publish (e.g. 0.1.0, no leading v)'
        required: true
        type: string
  push:
    tags:
      - 'sdk-v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@bc-solutions-coder'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Sync package version from sdk-v tag or dispatch input
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push: strip the "sdk-v" prefix (e.g. sdk-v0.1.0 -> 0.1.0).
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#sdk-v}"
          else
            # Manual dispatch: use the provided version verbatim.
            VERSION="${{ inputs.version }}"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::No version resolved (empty sdk-v tag suffix and empty dispatch input)." >&2
            exit 1
          fi
          echo "Setting package version to $VERSION"
          pnpm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to GitHub Packages
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
