name: JS CI

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".oxlintrc.json"
      - ".oxfmtrc.json"
      - ".nvmrc"
      - ".npmrc"
      - ".github/workflows/js.yml"
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".oxlintrc.json"
      - ".oxfmtrc.json"
      - ".nvmrc"
      - ".npmrc"
      - ".github/workflows/js.yml"

concurrency:
  group: js-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Enable corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      # Workspace members resolve @bc-solutions-coder/* packages through their
      # package.json `exports` maps, which point at dist/. Build every package
      # first — in topological order (styles before web-shell, which depends on
      # it) — so dependent members (the apps) can typecheck against the emitted
      # .d.ts files.
      - name: Build packages
        run: pnpm --filter './packages/*' build

      - name: Typecheck
        run: pnpm typecheck

      # Vitest browser-mode specs drive a real Chromium via the Playwright
      # provider. ubuntu-latest runners have no Playwright browser cache, so
      # install the browser (and its OS deps) before the Test step.
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
