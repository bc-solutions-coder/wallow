name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('api/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore previous build output
        uses: actions/cache/restore@v6
        with:
          path: |
            **/bin/Release
            **/obj
          key: build-v2-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            build-v2-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore api/Wallow.slnx

      # Force Tailwind to regenerate on every build. dotnet build is incremental and
      # keys Tailwind output off Styles/app.css, not the scanned razor files, so a
      # restored (cross-commit) generated app.css would otherwise ship stale CSS.
      - name: Clean generated Tailwind CSS
        run: rm -f api/src/Wallow.Web/wwwroot/css/app.css api/src/Wallow.Auth/wwwroot/css/app.css

      - name: Build
        run: dotnet build api/Wallow.slnx --no-restore --configuration Release --graph

      - name: Check code formatting
        run: dotnet format api/Wallow.slnx --verify-no-changes --no-restore

      - name: Cache build output
        uses: actions/cache/save@v6
        with:
          path: |
            **/bin/Release
            **/obj
          key: build-v2-${{ runner.os }}-${{ github.sha }}

  unit-tests:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('api/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore build output
        uses: actions/cache/restore@v6
        with:
          path: |
            **/bin/Release
            **/obj
          key: build-v2-${{ runner.os }}-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Restore dependencies
        run: dotnet restore api/Wallow.slnx

      - name: Run unit tests
        run: dotnet test api/Wallow.slnx --no-build --configuration Release --filter "Category!=Integration&Category!=E2E" --verbosity normal --blame-hang-timeout 60s --collect "XPlat Code Coverage" --settings api/tests/coverage.runsettings --results-directory ./TestResults

      - name: Upload unit test coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit
          path: ./TestResults/**/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 5

  integration-tests:
    needs: build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: wallow
          POSTGRES_PASSWORD: wallow
          POSTGRES_DB: wallow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Start Valkey with password
        run: |
          docker run -d --name valkey -p 6379:6379 valkey/valkey:8-alpine \
            valkey-server --requirepass WallowTestValkey123! --appendonly yes
          for i in $(seq 1 10); do
            if docker exec valkey valkey-cli -a WallowTestValkey123! ping 2>/dev/null | grep -q PONG; then
              echo "Valkey is ready"
              break
            fi
            if [ "$i" -eq 10 ]; then
              echo "::error::Valkey did not become healthy in time"
              docker logs valkey
              exit 1
            fi
            sleep 1
          done

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('api/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore build output
        uses: actions/cache/restore@v6
        with:
          path: |
            **/bin/Release
            **/obj
          key: build-v2-${{ runner.os }}-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Restore dependencies
        run: dotnet restore api/Wallow.slnx

      - name: Run integration tests
        run: dotnet test api/Wallow.slnx --no-build --configuration Release --filter "Category=Integration" --verbosity normal --blame-hang-timeout 5m --collect "XPlat Code Coverage" --settings api/tests/coverage.runsettings --results-directory ./TestResults
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=wallow_test;Username=wallow;Password=wallow"
          Redis__ConnectionString: "localhost:6379,password=WallowTestValkey123!,abortConnect=false"

      - name: Upload integration test coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-integration
          path: ./TestResults/**/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 5

  docker-images-app:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('api/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore build output
        uses: actions/cache/restore@v6
        with:
          path: |
            **/bin/Release
            **/obj
          key: build-v2-${{ runner.os }}-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Restore dependencies
        run: dotnet restore api/Wallow.slnx

      - name: Publish app container images
        run: |
          # x64 images for E2E testing on ubuntu runner
          dotnet publish api/src/Wallow.Api/Wallow.Api.csproj \
            -c Release --no-build /t:PublishContainer \
            -p:ContainerImageTag=test \
            -p:ContainerRuntimeIdentifier=linux-x64
          dotnet publish api/src/Wallow.Auth/Wallow.Auth.csproj \
            -c Release --no-build /t:PublishContainer \
            -p:ContainerImageTag=test \
            -p:ContainerRuntimeIdentifier=linux-x64
          dotnet publish api/src/Wallow.Web/Wallow.Web.csproj \
            -c Release --no-build /t:PublishContainer \
            -p:ContainerImageTag=test \
            -p:ContainerRuntimeIdentifier=linux-x64
          dotnet publish api/src/Wallow.MigrationService/Wallow.MigrationService.csproj \
            -c Release --no-build /t:PublishContainer \
            -p:ContainerImageTag=test \
            -p:ContainerRuntimeIdentifier=linux-x64
          dotnet publish api/src/Wallow.SeederService/Wallow.SeederService.csproj \
            -c Release --no-build /t:PublishContainer \
            -p:ContainerImageTag=test \
            -p:ContainerRuntimeIdentifier=linux-x64

          # arm64 images for multi-arch push
          dotnet publish api/src/Wallow.Api/Wallow.Api.csproj \
            -c Release --no-build /t:PublishContainer \
            -p:ContainerImageTag=test-arm64 \
            -p:ContainerRuntimeIdentifier=linux-arm64
          dotnet publish api/src/Wallow.Auth/Wallow.Auth.csproj \
            -c Release --no-build /t:PublishContainer \
            -p:ContainerImageTag=test-arm64 \
            -p:ContainerRuntimeIdentifier=linux-arm64
          dotnet publish api/src/Wallow.Web/Wallow.Web.csproj \
            -c Release --no-build /t:PublishContainer \
            -p:ContainerImageTag=test-arm64 \
            -p:ContainerRuntimeIdentifier=linux-arm64
          dotnet publish api/src/Wallow.MigrationService/Wallow.MigrationService.csproj \
            -c Release --no-build /t:PublishContainer \
            -p:ContainerImageTag=test-arm64 \
            -p:ContainerRuntimeIdentifier=linux-arm64
          dotnet publish api/src/Wallow.SeederService/Wallow.SeederService.csproj \
            -c Release --no-build /t:PublishContainer \
            -p:ContainerImageTag=test-arm64 \
            -p:ContainerRuntimeIdentifier=linux-arm64

      - name: Save app images to cache
        run: |
          docker save \
            wallow-api:test wallow-api:test-arm64 \
            wallow-auth:test wallow-auth:test-arm64 \
            wallow-web:test wallow-web:test-arm64 \
            wallow-migrations:test wallow-migrations:test-arm64 \
            wallow-seeder:test wallow-seeder:test-arm64 \
            | gzip > /tmp/wallow-images-app.tar.gz

      - name: Cache app images
        uses: actions/cache/save@v6
        with:
          path: /tmp/wallow-images-app.tar.gz
          key: images-app-${{ github.sha }}

  docker-images-infra:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Build infra images
        run: |
          docker compose -f docker/docker-compose.test.yml build garage
          docker build -t wallow-postgres-replica:latest docker/images/postgres-replica

      - name: Save infra images to cache
        run: |
          docker save \
            wallow-garage:test wallow-postgres-replica:latest \
            | gzip > /tmp/wallow-images-infra.tar.gz

      - name: Cache infra images
        uses: actions/cache/save@v6
        with:
          path: /tmp/wallow-images-infra.tar.gz
          key: images-infra-${{ github.sha }}

  e2e:
    # Disabled: the containerized E2E suite is flaky in CI (Playwright navigation
    # timeouts and Blazor-readiness races produce intermittent failures unrelated
    # to the change under test). Run it locally with ./scripts/run-e2e.sh instead.
    # Re-enable by removing this `if` guard once the suite is stabilized.
    if: false
    needs: [build, docker-images-app, docker-images-infra]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('api/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore build output
        uses: actions/cache/restore@v6
        with:
          path: |
            **/bin/Release
            **/obj
          key: build-v2-${{ runner.os }}-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Restore app images
        uses: actions/cache/restore@v6
        with:
          path: /tmp/wallow-images-app.tar.gz
          key: images-app-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Restore infra images
        uses: actions/cache/restore@v6
        with:
          path: /tmp/wallow-images-infra.tar.gz
          key: images-infra-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Load container images
        run: |
          docker load < /tmp/wallow-images-app.tar.gz
          docker load < /tmp/wallow-images-infra.tar.gz

      - name: Configure host.docker.internal for OIDC
        run: echo "127.0.0.1 host.docker.internal" | sudo tee -a /etc/hosts

      - name: Start test environment
        run: docker compose -f docker/docker-compose.test.yml up -d

      - name: Build E2E tests and install Playwright
        run: |
          dotnet build api/tests/Wallow.E2E.Tests -c Release --no-restore
          pwsh api/tests/Wallow.E2E.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for wallow-api..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5050/health/ready > /dev/null 2>&1; then
              echo "wallow-api is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::wallow-api did not become healthy in time"
              docker compose -f docker/docker-compose.test.yml logs
              exit 1
            fi
            sleep 5
          done

          echo "Waiting for wallow-auth..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5051/health > /dev/null 2>&1; then
              echo "wallow-auth is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::wallow-auth did not become healthy in time"
              docker compose -f docker/docker-compose.test.yml logs
              exit 1
            fi
            sleep 5
          done

          echo "Waiting for wallow-web..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5053/health > /dev/null 2>&1; then
              echo "wallow-web is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::wallow-web did not become healthy in time"
              docker compose -f docker/docker-compose.test.yml logs
              exit 1
            fi
            sleep 5
          done

      - name: Run E2E tests
        run: dotnet test api/tests/Wallow.E2E.Tests --no-build --configuration Release --settings api/tests/coverage.runsettings --verbosity normal --blame-hang-timeout 5m
        env:
          E2E_BASE_URL: "http://localhost:5050"
          E2E_AUTH_URL: "http://localhost:5051"
          E2E_WEB_URL: "http://localhost:5053"
          E2E_MAILPIT_URL: "http://localhost:8035"
          E2E_EXTERNAL_SERVICES: "true"

      - name: Upload E2E failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failure-artifacts
          path: api/tests/Wallow.E2E.Tests/test-results/
          retention-days: 7

      - name: Tear down test environment
        if: always()
        run: docker compose -f docker/docker-compose.test.yml down -v

  merge-coverage:
    needs: [unit-tests, integration-tests]
    if: always() && (needs.unit-tests.result == 'success' || needs.integration-tests.result == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Download unit test coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-unit
          path: ./coverage/unit
        continue-on-error: true

      - name: Download integration test coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-integration
          path: ./coverage/integration
        continue-on-error: true

      - name: Check for coverage files
        id: check-coverage
        run: |
          FILES=$(find ./coverage -name "coverage.cobertura.xml" -type f 2>/dev/null)
          if [ -z "$FILES" ]; then
            echo "::warning::No coverage artifacts were produced by test jobs. Coverage reporting skipped."
            echo "has_coverage=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found coverage files:"
            echo "$FILES"
            echo "has_coverage=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install ReportGenerator
        if: steps.check-coverage.outputs.has_coverage == 'true'
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Merge coverage reports
        if: steps.check-coverage.outputs.has_coverage == 'true'
        run: reportgenerator -reports:"./coverage/**/coverage.cobertura.xml" -targetdir:"./coverage/merged" -reporttypes:"Cobertura;HtmlSummary"

      - name: Enforce coverage threshold
        if: steps.check-coverage.outputs.has_coverage == 'true'
        run: |
          LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' ./coverage/merged/Cobertura.xml | head -1)
          if [ -z "$LINE_RATE" ]; then
            echo "::error::Failed to extract line-rate from Cobertura.xml"
            exit 1
          fi
          PERCENT=$(awk "BEGIN {printf \"%.1f\", ${LINE_RATE} * 100}")
          echo "Line coverage: ${PERCENT}%"
          MIN=90
          if [ "$(awk "BEGIN {print (${LINE_RATE} * 100 < $MIN)}")" = "1" ]; then
            echo "::error::Coverage ${PERCENT}% is below minimum threshold of ${MIN}%"
            exit 1
          fi

      - name: Upload merged coverage report
        if: steps.check-coverage.outputs.has_coverage == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ./coverage/merged
          retention-days: 30
