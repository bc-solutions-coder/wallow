name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Check code formatting
        run: dotnet format Wallow.slnx --verify-no-changes --no-restore

  unit-tests:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build
        run: dotnet build --configuration Release

      - name: Run unit tests
        run: dotnet test --no-build --configuration Release --filter "Category!=Integration&Category!=E2E" --verbosity normal --blame-hang-timeout 60s --collect "XPlat Code Coverage" --settings tests/coverage.runsettings --results-directory ./TestResults

      - name: Upload unit test coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit
          path: ./TestResults/**/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 5

  integration-tests:
    needs: build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: wallow
          POSTGRES_PASSWORD: wallow
          POSTGRES_DB: wallow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build
        run: dotnet build --configuration Release

      - name: Run integration tests
        run: dotnet test --no-build --configuration Release --filter "Category=Integration" --verbosity normal --blame-hang-timeout 5m --collect "XPlat Code Coverage" --settings tests/coverage.runsettings --results-directory ./TestResults
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=wallow_test;Username=wallow;Password=wallow"
          Redis__ConnectionString: "localhost:6379"

      - name: Upload integration test coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-integration
          path: ./TestResults/**/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 5

  e2e:
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # Build container images directly via dotnet publish — no Dockerfile needed.
      # Images are created in the local Docker daemon for E2E testing.
      - name: Publish API container image
        run: dotnet publish src/Wallow.Api/Wallow.Api.csproj -c Release /t:PublishContainer -p:ContainerImageTag=test -p:ContainerRepository=wallow-api

      - name: Publish Auth container image
        run: dotnet publish src/Wallow.Auth/Wallow.Auth.csproj -c Release /t:PublishContainer -p:ContainerImageTag=test -p:ContainerRepository=wallow-auth

      - name: Publish Web container image
        run: dotnet publish src/Wallow.Web/Wallow.Web.csproj -c Release /t:PublishContainer -p:ContainerImageTag=test -p:ContainerRepository=wallow-web

      - name: Configure host.docker.internal for OIDC
        run: echo "127.0.0.1 host.docker.internal" | sudo tee -a /etc/hosts

      # Start containers BEFORE Playwright install so they boot in parallel
      - name: Start test environment
        run: docker compose -f docker/docker-compose.test.yml up -d

      # Playwright install (~60s) overlaps with container startup (~60-90s)
      - name: Build E2E tests and install Playwright
        run: |
          dotnet build tests/Wallow.E2E.Tests -c Release
          pwsh tests/Wallow.E2E.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      # By now containers should be ready (booted during Playwright install)
      - name: Wait for services to be healthy
        run: |
          echo "Waiting for wallow-api..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5050/health/ready > /dev/null 2>&1; then
              echo "wallow-api is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::wallow-api did not become healthy in time"
              docker compose -f docker/docker-compose.test.yml logs
              exit 1
            fi
            sleep 5
          done

          echo "Waiting for wallow-auth..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5051/health > /dev/null 2>&1; then
              echo "wallow-auth is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::wallow-auth did not become healthy in time"
              docker compose -f docker/docker-compose.test.yml logs
              exit 1
            fi
            sleep 5
          done

          echo "Waiting for wallow-web..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5053/health > /dev/null 2>&1; then
              echo "wallow-web is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::wallow-web did not become healthy in time"
              docker compose -f docker/docker-compose.test.yml logs
              exit 1
            fi
            sleep 5
          done

      - name: Run E2E tests
        run: dotnet test tests/Wallow.E2E.Tests --no-restore --verbosity normal --blame-hang-timeout 5m
        env:
          E2E_BASE_URL: "http://localhost:5050"
          E2E_AUTH_URL: "http://localhost:5051"
          E2E_WEB_URL: "http://localhost:5053"
          E2E_MAILPIT_URL: "http://localhost:8035"
          E2E_EXTERNAL_SERVICES: "true"

      - name: Upload E2E failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: tests/Wallow.E2E.Tests/test-results/
          retention-days: 7

      - name: Tear down test environment
        if: always()
        run: docker compose -f docker/docker-compose.test.yml down -v

  # Push images to GHCR after ALL tests pass — only on main branch
  push-images:
    needs: [unit-tests, integration-tests, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push API image to GHCR
        env:
          SHA_TAG: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA_TAG:0:7}"
          dotnet publish src/Wallow.Api/Wallow.Api.csproj -c Release /t:PublishContainer \
            -p:ContainerRegistry=${{ env.REGISTRY }} \
            -p:ContainerRepository=${{ github.repository }} \
            -p:ContainerImageTags="\"latest;${SHORT_SHA}\""

      - name: Push Auth image to GHCR
        env:
          SHA_TAG: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA_TAG:0:7}"
          dotnet publish src/Wallow.Auth/Wallow.Auth.csproj -c Release /t:PublishContainer \
            -p:ContainerRegistry=${{ env.REGISTRY }} \
            -p:ContainerRepository=${{ github.repository }}-auth \
            -p:ContainerImageTags="\"latest;${SHORT_SHA}\""

      - name: Push Web image to GHCR
        env:
          SHA_TAG: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA_TAG:0:7}"
          dotnet publish src/Wallow.Web/Wallow.Web.csproj -c Release /t:PublishContainer \
            -p:ContainerRegistry=${{ env.REGISTRY }} \
            -p:ContainerRepository=${{ github.repository }}-web \
            -p:ContainerImageTags="\"latest;${SHORT_SHA}\""

  merge-coverage:
    needs: [unit-tests, integration-tests]
    if: always() && (needs.unit-tests.result == 'success' || needs.integration-tests.result == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Download unit test coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-unit
          path: ./coverage/unit
        continue-on-error: true

      - name: Download integration test coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-integration
          path: ./coverage/integration
        continue-on-error: true

      - name: Check for coverage files
        id: check-coverage
        run: |
          FILES=$(find ./coverage -name "coverage.cobertura.xml" -type f 2>/dev/null)
          if [ -z "$FILES" ]; then
            echo "::warning::No coverage artifacts were produced by test jobs. Coverage reporting skipped."
            echo "has_coverage=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found coverage files:"
            echo "$FILES"
            echo "has_coverage=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install ReportGenerator
        if: steps.check-coverage.outputs.has_coverage == 'true'
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Merge coverage reports
        if: steps.check-coverage.outputs.has_coverage == 'true'
        run: reportgenerator -reports:"./coverage/**/coverage.cobertura.xml" -targetdir:"./coverage/merged" -reporttypes:"Cobertura;HtmlSummary"

      - name: Enforce coverage threshold
        if: steps.check-coverage.outputs.has_coverage == 'true'
        run: |
          LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' ./coverage/merged/Cobertura.xml | head -1)
          PERCENT=$(awk "BEGIN {printf \"%.1f\", ${LINE_RATE:-0} * 100}")
          echo "Line coverage: ${PERCENT}%"
          MIN=90
          if [ "$(awk "BEGIN {print (${LINE_RATE:-0} * 100 < $MIN)}")" = "1" ]; then
            echo "::error::Coverage ${PERCENT}% is below minimum threshold of ${MIN}%"
            exit 1
          fi

      - name: Upload merged coverage report
        if: steps.check-coverage.outputs.has_coverage == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ./coverage/merged
          retention-days: 30
