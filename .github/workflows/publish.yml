# Publish - promotes images to :latest and semver tags on release
#
# Triggered when release-please creates a GitHub Release (via tag push)
# or manually via workflow_dispatch.
#
# The deploy workflow (deploy.yml) pushed images with :sha tags.
# This workflow retags those images with :latest, semver, and major.minor,
# then scans for vulnerabilities.
#
# Tag tiers:
#   :nightly       — latest main commit (may be broken)
#   :latest        — current released version (set here)
#   :X.Y.Z / :X.Y — pinned semver versions (set here)

name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.3)'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Extract version and SHA
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "semver=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "semver=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
          echo "short_sha=${COMMIT_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Wait for source images to be published
        env:
          SHORT_SHA: ${{ steps.version.outputs.short_sha }}
        run: |
          # The deploy workflow builds and pushes the :sha images for this same
          # commit. The tag push (this workflow) and the branch push (deploy)
          # start concurrently, so the :sha images may not exist yet when this
          # job begins. Poll until every image is available before promoting.
          suffixes=("" "-auth" "-web" "-migrations" "-seeder" "-garage" "-postgres-replica")
          deadline=$(( $(date +%s) + 1800 ))  # 30 minutes
          for suffix in "${suffixes[@]}"; do
            image="${IMAGE_BASE}${suffix}:${SHORT_SHA}"
            until docker buildx imagetools inspect "$image" >/dev/null 2>&1; do
              if [ "$(date +%s)" -ge "$deadline" ]; then
                echo "::error::Timed out waiting for ${image}. Check that the deploy workflow for this commit succeeded."
                exit 1
              fi
              echo "Waiting for ${image} ..."
              sleep 20
            done
            echo "Found ${image}"
          done

      - name: Promote images to :latest and semver tags
        env:
          VERSION: ${{ steps.version.outputs.semver }}
          SHORT_SHA: ${{ steps.version.outputs.short_sha }}
        run: |
          MAJOR_MINOR="${VERSION%.*}"

          for suffix in "" "-auth" "-web" "-migrations" "-seeder" "-garage" "-postgres-replica"; do
            image="${IMAGE_BASE}${suffix}"

            docker buildx imagetools create \
              --tag "${image}:${VERSION}" \
              --tag "${image}:${MAJOR_MINOR}" \
              --tag "${image}:latest" \
              "${image}:${SHORT_SHA}"

            echo "Promoted ${image}:${SHORT_SHA} -> :latest, :${VERSION}, :${MAJOR_MINOR}"
          done

      - name: Scan API image for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_BASE }}:${{ steps.version.outputs.semver }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
