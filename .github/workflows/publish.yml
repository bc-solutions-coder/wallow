# Publish - tags released images with semver versions
#
# Triggered when release-please creates a GitHub Release (via tag push)
# or manually via workflow_dispatch.
#
# The CI pipeline (ci.yml) already built, tested, and pushed images
# with :latest and :sha tags. This workflow pulls those images and
# retags them with semver versions, then scans for vulnerabilities.

name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.3)'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Extract version from tag
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "semver=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "semver=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull, retag, and push with semver
        env:
          VERSION: ${{ steps.version.outputs.semver }}
        run: |
          MAJOR_MINOR="${VERSION%.*}"

          for suffix in "" "-auth" "-web"; do
            image="${IMAGE_BASE}${suffix}"

            echo "Pulling ${image}:latest..."
            docker pull "${image}:latest"

            echo "Tagging with version ${VERSION}..."
            docker tag "${image}:latest" "${image}:${VERSION}"
            docker tag "${image}:latest" "${image}:${MAJOR_MINOR}"

            docker push "${image}:${VERSION}"
            docker push "${image}:${MAJOR_MINOR}"

            echo "Pushed ${image}:${VERSION} and ${image}:${MAJOR_MINOR}"
          done

      - name: Scan API image for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_BASE }}:${{ steps.version.outputs.semver }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
