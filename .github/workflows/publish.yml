# Publish - builds and pushes Docker image to GitHub Container Registry
#
# Triggered on push to main (after PR merge) or manually.
# Images are tagged with semver (via GitVersion), latest, and git SHA.
# Pull with: docker pull ghcr.io/<owner>/foundry:<tag>

name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v3.1.11
        with:
          versionSpec: '6.0.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.3.3

      - name: Tag version
        run: |
          git tag "v${{ steps.gitversion.outputs.fullSemVer }}"
          git push origin "v${{ steps.gitversion.outputs.fullSemVer }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.gitversion.outputs.fullSemVer }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.gitversion.outputs.fullSemVer }}
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.gitversion.outputs.fullSemVer }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
