# Publish - tags released images with semver versions
#
# Triggered when release-please creates a GitHub Release (via tag push)
# or manually via workflow_dispatch.
#
# The CI pipeline (ci.yml) already built, tested, and pushed images
# with :sha tags. This workflow retags those images with semver versions
# and :latest, then scans for vulnerabilities.

name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.3)'
        required: false
      sha:
        description: 'Git SHA of the CI-built image to retag (short or full)'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Extract version and SHA
        id: meta
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_SHA: ${{ inputs.sha }}
          REF_NAME: ${{ github.ref_name }}
          FULL_SHA: ${{ github.sha }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "semver=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "semver=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$INPUT_SHA" ]; then
            echo "short_sha=${INPUT_SHA:0:7}" >> "$GITHUB_OUTPUT"
          else
            echo "short_sha=${FULL_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Retag multi-arch manifests with semver and latest
        env:
          VERSION: ${{ steps.meta.outputs.semver }}
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
        run: |
          MAJOR_MINOR="${VERSION%.*}"

          for suffix in "" "-auth" "-web" "-migrations" "-garage" "-postgres-replica"; do
            image="${IMAGE_BASE}${suffix}"

            docker buildx imagetools create \
              --tag "${image}:${VERSION}" \
              --tag "${image}:${MAJOR_MINOR}" \
              --tag "${image}:latest" \
              "${image}:${SHORT_SHA}"

            echo "Pushed ${image}:${VERSION}, ${image}:${MAJOR_MINOR}, and ${image}:latest"
          done

      - name: Scan API image for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_BASE }}:${{ steps.meta.outputs.semver }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
